model_list:
  - model_name: coach-model
    litellm_params:
      model: openai/qwen/qwen3.5-flash-02-23
      api_base: https://polza.ai/api/v1
      api_key: os.environ/POLZA_AI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  set_verbose: false