experiment_name: qwen_0_5b_qlora
model_name: Qwen/Qwen2.5-0.5B-Instruct

dataset:
  train_file: finetuning/data/processed/train.jsonl
  validation_file: finetuning/data/processed/validation.jsonl
  text_field: text

training:
  output_dir: finetuning/outputs/adapters/qwen_0_5b_qlora
  metrics_dir: finetuning/outputs/metrics
  num_train_epochs: 2
  max_steps: 25
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  max_seq_length: 512
  logging_steps: 10
  eval_steps: 25
  save_steps: 25
  seed: 42
  fp16: true
  bf16: false
  gradient_checkpointing: true

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

quantization:
  use_4bit: false
  bnb_4bit_compute_dtype: float16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true